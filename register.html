<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="icon" href="imagenes/logo.png" />
    <style>
      /* Ocultar barra de scroll manteniendo funcionalidad */
      html, body {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE y Edge */
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none; /* Chrome, Safari y Edge */
      }
    </style>
</head>
<body class="w-screen">
   <main class="h-screen w-full flex">

    <section class="md:w-1/2 bg-blue-900">
        <img src="imagenes/carretera-1.avif" alt="" class="h-screen object-cover blur-sm opacity-70 ">
    </section>


    <section class="md:w-1/2  border-2 bg-black flex justify-center flex-col p-20">
      <div class="mb-4 border-white">
          <div class="text-center">
            <h1
              class="text-5xl font-extrabold cursor-default text-neutral-50 pb-5"
            >
              C<span
                class="drop-shadow-[0_0_1.5px_rgba(255,223,32,0.8)] text-amber-500"
                >+</span
              >
            </h1>
          </div>
          <br />
          <div class="flex justify-center flex-col p-10 border-white">
                <label class="text-neutral-100 text-sm block" for="correo-id"
                >Correo electronico</label
              >
              <input
                id="correo-id"
                type="email"
                class="border rounded pl-1 mb-10 text-white w-50 bg-slate-800"
              />
              <br />
              <label class="text-neutral-100 text-sm block" for="password-id"
                >Contraseña</label
              >
              <input
                id="password-id"
                type="password"
                class="border rounded pl-1 mb-10 text-white w-50 bg-slate-800"
              />
            
            <button
              class="transition-all w-50 bg-blue-800 text-white font-bold py-2 rounded hover:bg-amber-400 hover:text-slate-950 cursor-pointer text-sm"
            >
              Registrate
            </button>
            <hr class="mt-5 border-neutral-600" />
            <br />
          </div>
          


        <div class="text-center flex justify-center gap-2">
          <button
            class="flex text-white transition-all w-50 p-2 bg-slate-800 rounded text-xs gap-2 justify-center"
          >
            <img src="imagenes/icons8-google.svg" alt="" class="w-5" />
            Continue con Google
          </button>
          <p class="text-white text-sm pt-3">
            ya tienes una cuenta?
            <a
              href="login.html"
              class="text-blue-400 underline hover:text-amber-500"
              >Inicia sesion</a
            >
          </p>
        </div>
      </div>
    </div>

    </section>
   </main>

   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
